<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAJRA AI | Alerts Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="index.css">

    <style>
        .alerts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .alert-card {
            border-radius: 12px;
            padding: 2rem;
            border-left: 6px solid var(--glass-border);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .alert-card.critical {
            border-left-color: var(--status-critical);
            background: linear-gradient(90deg, rgba(239, 68, 68, 0.1) 0%, rgba(239, 68, 68, 0.02) 100%);
        }

        .alert-card.moderate {
            border-left-color: var(--status-moderate);
            background: linear-gradient(90deg, rgba(245, 158, 11, 0.1) 0%, rgba(245, 158, 11, 0.02) 100%);
        }

        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .alert-header h3 {
            font-size: 1.4rem;
            font-family: 'Outfit', sans-serif;
            color: var(--text-primary);
        }

        .alert-header .alert-badge {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .critical .alert-badge {
            background-color: var(--status-critical);
            color: white;
        }

        .moderate .alert-badge {
            background-color: var(--status-moderate);
            color: white;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--glass-border);
        }

        .metric-label {
            color: var(--text-secondary);
        }

        .metric-value {
            font-weight: 600;
            color: var(--text-primary);
        }

        .critical .bad-value { color: var(--status-critical); }
        .moderate .bad-value { color: var(--status-moderate); }

        .recs-box {
            background-color: #f1f5f9;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        .recs-box ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .recs-box ul li {
            display: flex;
            gap: 0.5rem;
            align-items: flex-start;
        }

        .recs-box ul li i {
            margin-top: 0.2rem;
            color: var(--accent-color);
            font-size: 0.8rem;
        }

        .no-alerts {
            text-align: center;
            padding: 5rem 2rem;
            background: var(--glass-bg);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .no-alerts i {
            font-size: 4rem;
            color: var(--status-preventive);
            margin-bottom: 1.5rem;
        }

        .no-alerts h2 {
            font-size: 2rem;
            color: var(--text-primary);
        }

        .no-alerts p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }
    </style>
</head>

<body class="dark-theme">
    <nav class="navbar">
        <div class="logo" style="gap: 1rem;">
            <img src="logo.png" alt="VAJRA AI Logo" style="height: 46px; width: auto; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(14, 165, 233, 0.3));">
            <span style="font-size: 1.8rem; letter-spacing: -0.5px; font-weight: 400;">VAJRA <strong style="color: var(--accent-color); font-weight: 700;">AI</strong></span>
        </div>
        <div class="nav-links">
            <a href="simulator.html">Simulator</a>
            <a href="suppliers.html">Suppliers</a>
            <a href="alerts.html" class="active">Alerts</a>
            <a href="index.html" style="color: var(--status-critical); margin-left: 1rem;" title="Logout"><i class="fa-solid fa-power-off"></i></a>
        </div>
        <div class="user-profile">
            <img src="https://ui-avatars.com/api/?name=Admin&background=0D8ABC&color=fff" alt="Admin">
        </div>
    </nav>

    <main class="dashboard-container">
        <header class="dashboard-header" style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <h1>Active <span>Threats</span></h1>
                <p>Real-time monitoring of suppliers exceeding risk thresholds.</p>
            </div>
            <button onclick="fetchAlerts()" class="btn-primary" style="margin-top: 0;">
                <i class="fa-solid fa-rotate"></i> Refresh View
            </button>
        </header>

        <section id="alerts-loading" style="text-align: center; padding: 4rem;">
            <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 2.5rem; color: var(--accent-color);"></i>
        </section>

        <section id="alerts-container" class="alerts-grid hidden">
            <!-- Alert Cards Generated Here -->
        </section>

        <section id="no-alerts-view" class="no-alerts hidden">
            <i class="fa-solid fa-shield-check"></i>
            <h2>System Secure</h2>
            <p>No active critical or moderate threats discovered across all monitored suppliers.</p>
        </section>
    </main>

    <script src="alerts.js"></script>
</body>

</html>
